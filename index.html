<body id="top">
    <header>
        <div class="header-content">
            <h1>Marcelo Oliveira Ribeiro</h1>
            <p>Assistant Professor • Federal University of Maranhão</p>
            <div class="social-links-header">
                <a href="marcelo.or@ufma.br"><i class="fas fa-envelope"></i>marcelo.or@ufma.br</a>

        </div>
        <div class="header-image">

     <main>
        <section id="about">
            <p>My research is in transcendental number theory and related topics.</p>
        </section>

        <section id="publications">
            <div class="publications-header">

            </div>
            <div id="publications-container">
                <!-- Publications will be dynamically loaded here -->
            </div>

        <section id="miscellaneous">
            <h2>Miscellaneous</h2>
            <div class="misc-item">
                <p>[Optional] Share your hobbies and interests here.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Last updated: [Month YYYY].</p>
    </footer>

    <div id="imageModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>
    <script src="scripts.js"></script>
